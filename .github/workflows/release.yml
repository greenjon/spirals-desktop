name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0, v2.1.3-beta)
  workflow_dispatch: # Allows manually triggering the build from the GitHub UI

permissions:
  contents: write # Needed to create releases and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle dependencies and build steps

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Install MkDocs and Material Theme
        run: |
          pipx install mkdocs
          pipx inject mkdocs mkdocs-material

      - name: Build and Package ZIPs
        run: ./gradlew packageZips

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/distributions/spirals-desktop-windows-x64.zip
            build/distributions/spirals-desktop-linux-x64.zip
            build/distributions/spirals-desktop-linux-arm64.zip
            build/distributions/spirals-desktop-macos-arm64.zip
            build/distributions/spirals-desktop-macos-x64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
